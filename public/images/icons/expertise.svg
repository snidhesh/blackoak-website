<svg width="42" height="42" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Outer ring -->
<circle cx="21" cy="21" r="19" stroke="black" stroke-width="1.5"/>
<circle cx="21" cy="21" r="17" stroke="black" stroke-width="0.75"/>
<!-- Tick marks for cardinal and intercardinal directions -->
<line x1="21" y1="2" x2="21" y2="5.5" stroke="black" stroke-width="1.2"/>
<line x1="21" y1="36.5" x2="21" y2="40" stroke="black" stroke-width="1.2"/>
<line x1="2" y1="21" x2="5.5" y2="21" stroke="black" stroke-width="1.2"/>
<line x1="36.5" y1="21" x2="40" y2="21" stroke="black" stroke-width="1.2"/>
<!-- Intercardinal ticks (NE, SE, SW, NW) -->
<line x1="7.55" y1="7.55" x2="9.58" y2="9.58" stroke="black" stroke-width="0.75"/>
<line x1="32.42" y1="32.42" x2="34.45" y2="34.45" stroke="black" stroke-width="0.75"/>
<line x1="34.45" y1="7.55" x2="32.42" y2="9.58" stroke="black" stroke-width="0.75"/>
<line x1="7.55" y1="34.45" x2="9.58" y2="32.42" stroke="black" stroke-width="0.75"/>
<!-- Compass rose - 8-pointed star -->
<!-- N -->
<polygon points="21,5 22.8,17.5 21,15 19.2,17.5" fill="black"/>
<!-- S -->
<polygon points="21,37 19.2,24.5 21,27 22.8,24.5" fill="black" opacity="0.35"/>
<!-- E -->
<polygon points="37,21 24.5,19.2 27,21 24.5,22.8" fill="black" opacity="0.35"/>
<!-- W -->
<polygon points="5,21 17.5,22.8 15,21 17.5,19.2" fill="black"/>
<!-- NE -->
<polygon points="33.3,8.7 23.5,17.2 24.8,17.2 23.8,16.2" fill="black" opacity="0.55"/>
<!-- SW -->
<polygon points="8.7,33.3 18.5,24.8 17.2,24.8 18.2,25.8" fill="black" opacity="0.55"/>
<!-- NW -->
<polygon points="8.7,8.7 17.2,18.5 17.2,17.2 18.2,18.2" fill="black" opacity="0.55"/>
<!-- SE -->
<polygon points="33.3,33.3 24.8,23.5 24.8,24.8 23.8,23.8" fill="black" opacity="0.55"/>
<!-- Center circle -->
<circle cx="21" cy="21" r="2.5" stroke="black" stroke-width="1" fill="white"/>
<circle cx="21" cy="21" r="1" fill="black"/>
</svg>
